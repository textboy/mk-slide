<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CI/CD Rule Deployment Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
  background: #0a0a12;
  color: #c8cce0;
  font-family: 'Space Mono', monospace;
  -webkit-font-smoothing: antialiased;
  display: flex; flex-direction: column;
  height: 100vh; height: 100dvh;
  position: relative;
}

body::before {
  content: ''; position: absolute; inset: 0;
  background-image: linear-gradient(rgba(61,90,254,.05) 1px, transparent 1px), linear-gradient(90deg, rgba(61,90,254,.05) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}
body::after {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.08) 2px, rgba(0,0,0,.08) 4px);
  pointer-events: none; z-index: 0;
}

.glow-orb {
  position: fixed;
  border-radius: 50%; filter: blur(80px); pointer-events: none; z-index: 0;
  width: clamp(200px, 30vw, 400px); height: clamp(200px, 30vw, 400px);
  top: -15%; right: -10%;
  background: radial-gradient(circle, rgba(61,90,254,0.1) 0%, transparent 70%);
}

.slide {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: clamp(20px, 3vh, 40px);
  position: relative; z-index: 1;
}

.title {
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: clamp(18px, 2.2vw, 32px);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  text-align: center;
  margin-bottom: clamp(16px, 2.5vh, 36px);
}
.title .accent {
  color: #3d5afe;
  text-shadow: 0 0 30px rgba(61,90,254,.3);
}
.title .dim {
  color: #4a4e6a;
  font-weight: 400;
}

.diagram-container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  max-width: 95vw;
  max-height: calc(100vh - 120px);
}

.diagram-container img {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
  object-fit: contain;
  border-radius: 8px;
  box-shadow: 0 0 40px rgba(61,90,254,.08);
}

.page-counter {
  position: fixed;
  bottom: clamp(16px, 2vh, 28px);
  right: clamp(20px, 2.5vw, 40px);
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(10px, 0.9vw, 13px);
  font-weight: 600;
  color: #4a4e6a;
  z-index: 1000;
  letter-spacing: 0.15em;
}
.page-counter .current { color: #3d5afe; text-shadow: 0 0 8px rgba(61,90,254,0.5); }

.hud-label {
  font-family: 'Space Mono', monospace;
  font-size: clamp(7px, 0.6vw, 10px);
  color: #4a4e6a;
  letter-spacing: 0.15em;
  position: fixed;
  bottom: clamp(16px, 2vh, 28px);
  left: clamp(20px, 2.5vw, 40px);
  z-index: 1000;
}

@media (max-height: 500px) {
  .title { font-size: 14px; margin-bottom: 8px; }
  .slide { padding: 8px; }
}
</style>
</head>
<body>

<div class="glow-orb"></div>
<div class="slide">
  <div class="title">
    <span class="dim">//</span> CI/CD Rule Deployment <span class="accent">Pipeline</span>
  </div>
  <div class="diagram-container">
    <img src="cicd-flow.png" alt="CI/CD Pipeline Diagram">
  </div>
</div>

<div class="hud-label"><span class="cursor">_</span> SYSTEM: MONITORING ACTIVE</div>
<div class="page-counter">[ <span class="current">01</span> / <span class="current">01</span> ]</div>

<script>
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') window.close();
});
</script>
</body>
</html>
