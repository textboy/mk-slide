<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#100f0d;color:#e8e4df;font-family:'Plus Jakarta Sans',sans-serif;padding:2rem;min-height:100vh}
header{text-align:center;padding:2rem 0 1.5rem}
h1{font-size:2rem;font-weight:700;color:#fff}
h1 span{color:#e8643a}
.subtitle{color:#8a857e;margin:.5rem 0;font-size:.95rem}
.link{color:#e8643a;text-decoration:none;font-size:.85rem;display:inline-block;margin-top:.5rem;transition:opacity .2s}
.link:hover{opacity:.75}
.filters{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin:1.5rem 0 2rem}
.filters button{background:#1a1917;border:1px solid #2a2825;color:#8a857e;padding:.4rem 1rem;border-radius:99px;cursor:pointer;font-family:inherit;font-size:.8rem;transition:all .2s}
.filters button.active,.filters button:hover{background:#e8643a;color:#fff;border-color:#e8643a}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.25rem;max-width:1200px;margin:0 auto}
.card{background:#1a1917;border:1px solid #2a2825;border-radius:12px;overflow:hidden;transition:transform .2s,border-color .2s}
.card:hover{transform:translateY(-3px);border-color:#3a3835}
.card .preview{position:relative}
.copy-btn{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.7);padding:3px 8px;border-radius:4px;font-size:10px;font-family:inherit;cursor:pointer;transition:opacity .2s,background .2s;pointer-events:auto;opacity:0;z-index:2}
.card:hover .copy-btn{opacity:1}
.copy-btn:hover{background:rgba(0,0,0,0.7);color:#fff}
.card[hidden]{display:none}
.preview{width:100%;aspect-ratio:16/10;position:relative;overflow:hidden;font-size:14px}
.info{padding:.85rem 1rem}
.name{font-size:.9rem;font-weight:600;color:#fff;margin-bottom:.3rem}
.vibe{font-size:.75rem;color:#8a857e;margin-bottom:.4rem}
.badge{display:inline-block;font-size:.65rem;padding:.15rem .55rem;border-radius:99px;background:#2a2825;color:#8a857e;text-transform:uppercase;letter-spacing:.04em}
footer{text-align:center;padding:2.5rem 0 1rem;color:#4a4540;font-size:.8rem}
footer a{color:#e8643a;text-decoration:none}
@media(max-width:640px){.grid{grid-template-columns:1fr}body{padding:1rem}}
.rec-section{display:none;max-width:1200px;margin:0 auto 2.5rem;padding:2rem 0}
.rec-section.visible{display:block}
.rec-header{margin-bottom:1.5rem}
.rec-title{font-size:1.6rem;font-weight:700;color:#fff;margin-bottom:.4rem}
.rec-meta{font-size:.8rem;color:#8a857e}
.rec-meta span{display:inline-block;background:#1a1917;border:1px solid #2a2825;padding:.2rem .6rem;border-radius:99px;margin-left:.4rem;font-size:.72rem}
.rec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem}
.rec-card{background:#1a1917;border:1px solid #2a2825;border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s}
.rec-card:hover{transform:translateY(-4px);border-color:#e8643a;box-shadow:0 12px 40px rgba(232,100,58,0.12)}
.rec-card .preview{width:100%;aspect-ratio:16/10;position:relative;overflow:hidden;font-size:14px}
.rec-card:hover .copy-btn{opacity:1}
.rec-info{padding:1rem 1.1rem}
.rec-name{font-size:1.05rem;font-weight:700;color:#fff;margin-bottom:.25rem}
.rec-reason{font-size:.8rem;color:#8a857e;line-height:1.5}
.rec-divider{max-width:1200px;margin:0 auto 2rem;border:none;border-top:1px solid #2a2825}
@media(max-width:900px){.rec-grid{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.rec-grid{grid-template-columns:1fr}}
.preview-overlay{position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.88);backdrop-filter:blur(20px);display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:opacity .3s cubic-bezier(.16,1,.3,1)}
.preview-overlay.active{opacity:1;pointer-events:auto}
.preview-topbar{height:44px;display:flex;align-items:center;padding:0 24px;flex-shrink:0;gap:16px}
.preview-close{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;line-height:1}
.preview-close:hover{background:rgba(255,255,255,0.2)}
.preview-title{flex:1;color:#8a857e;font-size:14px;font-weight:500;text-align:center}
.preview-newtab{color:#8a857e;font-size:13px;font-weight:500;text-decoration:none;padding:6px 14px;display:flex;align-items:center;gap:6px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.06);transition:background .2s,color .2s,border-color .2s;font-family:inherit;white-space:nowrap}
.preview-newtab:hover{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.25);color:#fff}
.preview-iframe-wrap{flex:1;display:flex;align-items:stretch;justify-content:center;padding:0 32px;min-height:0}
.preview-iframe-wrap iframe{width:100%;max-width:1440px;height:100%;border:none;border-radius:8px 8px 0 0;box-shadow:0 8px 40px rgba(0,0,0,0.4);background:#100f0d}
.preview-strip-wrap{flex-shrink:0;padding:0 32px;overflow:hidden}
.preview-strip{display:flex;gap:8px;padding:12px 0;overflow-x:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.15) transparent;-webkit-overflow-scrolling:touch}
.preview-strip::-webkit-scrollbar{height:8px}
.preview-strip::-webkit-scrollbar-track{background:rgba(255,255,255,0.05);border-radius:4px;margin:0 8px}
.preview-strip::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.25);border-radius:4px}
.preview-strip::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.4)}
.preview-strip-item{flex-shrink:0;width:280px;aspect-ratio:16/10;border-radius:10px;overflow:hidden;cursor:pointer;border:2px solid transparent;font-size:14px;opacity:.65;transition:opacity .2s,border-color .2s,transform .2s;position:relative}
.preview-strip-item:hover{opacity:.9;transform:translateY(-2px)}
.preview-strip-item.active{opacity:1;border-color:#e8643a;transform:translateY(-2px)}
.preview-strip-item .strip-label{position:absolute;bottom:6px;left:6px;padding:3px 8px;background:rgba(0,0,0,0.6);border-radius:4px;font-size:12px;color:#fff;white-space:nowrap;max-width:calc(100% - 8px);overflow:hidden;text-overflow:ellipsis}
.preview-bottombar{height:42px;display:flex;align-items:center;justify-content:center;gap:16px;flex-shrink:0}
.preview-nav{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);color:#8a857e;padding:7px 20px;border-radius:6px;font-size:13px;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:background .2s,color .2s}
.preview-nav:hover{background:rgba(255,255,255,0.15);color:#fff}
@media(max-width:640px){.preview-iframe-wrap{padding:0 8px 4px}.preview-iframe-wrap iframe{border-radius:4px}.preview-strip-wrap{display:none}.preview-nav{min-height:44px;padding:10px 16px}}

const CURATED_IDS=['keynote-noir','cinema-scope','dark-premium','terminal-green','swiss-modern','watercolor','wabi-sabi-zen','editorial-serif','vintage-editorial','creative-voltage','split-pastel','pop-art','art-deco-gatsby','retro-arcade','pink-handwritten','soft-dreamy','ink-wash','nihon-modern','blueprint-tech','aurora-mesh'];
const g=document.getElementById('grid');
S.forEach(([name,bg,accent,font,vibe,cat,deco])=>{
const light=['light','editorial'].includes(cat)||['#ffffff','#faf8f5','#f5f3ee','#f0e8ff','#F8F6F2','#f5f0e8','#f2ead8','#f5e6dc','#f7f3ee','#f5f3f0','#e8e4f0','#f5f2ed','#F2E8D9','#f7f4ef','#fbfaf8','#ffdd00','#ffe8ee','#E8D5E0','#f2e8d9'].includes(bg);
const textCol=light?'#1a1a1a':'#ffffff';
const c=document.createElement('div');
c.className='card';c.dataset.category=cat;
const sid=NAME_TO_ID[name];
c.dataset.sid=sid||'';
const previewHTML=sid&&PREVIEWS[sid]?PREVIEWS[sid]():`<div style="background:${bg};height:100%;display:flex;align-items:center;justify-content:center;"><span style="color:${accent};font-family:'${font}',sans-serif;font-size:2.8rem;opacity:.9">Aa</span></div>`;
const hoverHTML=sid?`<button class="copy-btn" data-style="${name}">复制指令</button>`:'';
c.innerHTML=`<div class="preview">${previewHTML}${hoverHTML}</div><div class="info"><div class="name">${name}</div><div class="vibe">${vibe}</div><span class="badge">${cat}</span></div>`;
if(sid){c.style.cursor='pointer';c.dataset.url='styles/'+sid+'.html';c.dataset.name=name;}
g.appendChild(c);
});
function applyFilter(cat){
document.querySelectorAll('.card').forEach(c=>{
if(cat==='all')c.hidden=false;
else if(cat==='curated')c.hidden=!CURATED_IDS.includes(c.dataset.sid);
else c.hidden=c.dataset.category!==cat;
});
}
applyFilter('curated');
document.querySelector('.filters').addEventListener('click',e=>{
if(e.target.tagName!=='BUTTON')return;
document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
e.target.classList.add('active');
applyFilter(e.target.dataset.cat);
});

// Recommendation section
(function(){
// Support both ?recommend= (server) and #recommend= (file://)
var hashStr=window.location.hash.slice(1);
var searchStr=window.location.search.slice(1);
var paramStr=hashStr||searchStr;
const params=new URLSearchParams(paramStr);
const recParam=params.get('recommend');
const recReason=params.get('reason')||'';
if(!recParam)return;
const recIds=recParam.split(',').map(s=>s.trim()).filter(Boolean);
if(!recIds.length)return;
const recReasons={};
// Parse per-style reasons from URL: reason_keynote-noir=xxx
recIds.forEach(id=>{
const r=params.get('reason_'+id);
if(r)recReasons[id]=decodeURIComponent(r);
});
const recSection=document.getElementById('recSection');
const recGrid=document.getElementById('recGrid');
const recMeta=document.getElementById('recMeta');
const recDivider=document.getElementById('recDivider');
recSection.classList.add('visible');
recDivider.style.display='';
if(recReason)recMeta.innerHTML='推荐依据：'+decodeURIComponent(recReason).split(',').map(t=>'<span>'+t.trim()+'</span>').join('');
recIds.forEach(function(rid){
var styleData=null;
S.forEach(function(s){if(NAME_TO_ID[s[0]]===rid)styleData=s;});
if(!styleData)return;
var [name,bg,accent,font,vibe,cat]=styleData;
var sid=NAME_TO_ID[name];
var previewFn=sid&&PREVIEWS[sid];
var previewHTML=previewFn?previewFn():'<div style="background:'+bg+';height:100%;display:flex;align-items:center;justify-content:center;"><span style="color:'+accent+';font-family:\''+font+'\',sans-serif;font-size:2.8rem;opacity:.9">Aa</span></div>';
var reason=recReasons[rid]||vibe;
var card=document.createElement('div');
card.className='rec-card';
card.dataset.url='styles/'+sid+'.html';
card.dataset.name=name;
card.dataset.sid=sid;
card.innerHTML='<div class="preview" style="position:relative">'+previewHTML+'<button class="copy-btn" data-style="'+name+'">复制指令</button></div><div class="rec-info"><div class="rec-name">'+name+'</div><div class="rec-reason">'+reason+'</div></div>';
recGrid.appendChild(card);
});
// Rec card clicks
recGrid.addEventListener('click',function(e){
var copyBtn=e.target.closest('.copy-btn');
if(copyBtn){
e.stopPropagation();
var style=copyBtn.getAttribute('data-style');
navigator.clipboard.writeText('用 '+style+' 风格做一个关于[你的主题]的演示文稿');
copyBtn.textContent='已复制';
setTimeout(function(){copyBtn.textContent='复制指令';},1500);
return;
}
var card=e.target.closest('.rec-card');
if(!card||!card.dataset.url)return;
// Build list from rec cards for preview nav
var recCards=recGrid.querySelectorAll('.rec-card');
pvList=[];
var idx=0;
recCards.forEach(function(c,i){
if(c.dataset.url)pvList.push({url:c.dataset.url,title:c.dataset.name,sid:c.dataset.sid});
if(c===card)idx=pvList.length-1;
});
pvIdx=idx;
loadPreview();
previewOverlay.classList.add('active');
document.body.style.overflow='hidden';
renderStrip();
});
})();

// Preview overlay
var previewOverlay=document.getElementById('previewOverlay');
var previewIframe=document.getElementById('previewIframe');
var previewTitle=document.getElementById('previewTitle');
var previewNewTab=document.getElementById('previewNewTab');
var previewStrip=document.getElementById('previewStrip');
var pvList=[],pvIdx=0;

function buildList(){
var cards=document.querySelectorAll('.card:not([hidden])');
var list=[];
cards.forEach(function(c){if(c.dataset.url)list.push({url:c.dataset.url,title:c.dataset.name,sid:c.dataset.sid});});
return list;
}

function renderStrip(){
previewStrip.innerHTML='';
pvList.forEach(function(item,i){
var t=document.createElement('div');
t.className='preview-strip-item'+(i===pvIdx?' active':'');
var fn=item.sid&&PREVIEWS[item.sid];
var inner=fn?fn():'<div style="background:#222;height:100%"></div>';
t.innerHTML=inner+'<div class="strip-label">'+item.title+'</div>';
(function(idx){t.addEventListener('click',function(){pvIdx=idx;loadPreview();updateActive();});})(i);
previewStrip.appendChild(t);
});
}

function updateActive(){
var items=previewStrip.querySelectorAll('.preview-strip-item');
items.forEach(function(el,i){el.classList.toggle('active',i===pvIdx);});
if(items[pvIdx])items[pvIdx].scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
}

function loadPreview(){
var item=pvList[pvIdx];
previewIframe.src=item.url;
previewTitle.textContent=item.title;
previewNewTab.href=item.url;
}

function openPreview(url,title,idx){
pvList=buildList();
pvIdx=idx||0;
loadPreview();
previewOverlay.classList.add('active');
document.body.style.overflow='hidden';
renderStrip();
}

function closePreview(){
previewOverlay.classList.remove('active');
document.body.style.overflow='';
setTimeout(function(){previewIframe.src='';},300);
}

function pvNav(dir){
if(!pvList.length)return;
pvIdx=Math.max(0,Math.min(pvList.length-1,pvIdx+dir));
loadPreview();
updateActive();
}

// Card click delegation
g.addEventListener('click',function(e){
// Copy button
var copyBtn=e.target.closest('.copy-btn');
if(copyBtn){
e.stopPropagation();
var style=copyBtn.getAttribute('data-style');
navigator.clipboard.writeText('用 '+style+' 风格做一个关于[你的主题]的演示文稿');
copyBtn.textContent='已复制';
setTimeout(function(){copyBtn.textContent='复制指令';},1500);
return;
}
// Preview button or card click → open preview
var card=e.target.closest('.card');
if(!card||!card.dataset.url)return;
var visible=document.querySelectorAll('.card:not([hidden])');
var idx=0;
visible.forEach(function(c,i){if(c===card)idx=i;});
openPreview(card.dataset.url,card.dataset.name,idx);
});

document.getElementById('previewClose').addEventListener('click',closePreview);
document.getElementById('previewPrev').addEventListener('click',function(){pvNav(-1);});
document.getElementById('previewNext').addEventListener('click',function(){pvNav(1);});
document.getElementById('previewCopyBtn').addEventListener('click',function(){
var title=previewTitle.textContent||'';
navigator.clipboard.writeText('用 '+title+' 风格做一个关于[你的主题]的演示文稿');
this.textContent='已复制';
var btn=this;
setTimeout(function(){btn.textContent='复制指令';},1500);
});
previewOverlay.addEventListener('click',function(e){if(e.target===previewOverlay)closePreview();});
document.addEventListener('keydown',function(e){
if(!previewOverlay.classList.contains('active'))return;
if(e.key==='Escape'){closePreview();e.preventDefault();}
if(e.key==='ArrowLeft'){pvNav(-1);e.preventDefault();}
if(e.key==='ArrowRight'){pvNav(1);e.preventDefault();}
});
</script>
