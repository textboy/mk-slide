<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Design Tokens ── */
:root {
  --bg: #100f0d;
  --bg-surface: #181714;
  --bg-card: #1c1b18;
  --border: rgba(255,245,230,0.07);
  --border-hover: rgba(255,245,230,0.14);
  --text: #ede8e0;
  --text-secondary: #9a9286;
  --text-muted: #5e584f;
  --accent: #e8643a;
  --accent-hover: #d45a32;
  --accent-soft: rgba(232,100,58,0.12);
}

/* ── Page Layout ── */
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Plus Jakarta Sans', 'Inter', system-ui, sans-serif;
  line-height: 1.55;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ═══════════════════════════════════════
   1. HERO SECTION
   ═══════════════════════════════════════ */
.hero {
  display: flex;
  flex-direction: column;
  max-width: 1280px;
  margin: 0 auto;
  padding: 80px 64px 48px;
  gap: 48px;
}
.hero-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 48px;
  width: 100%;
}
.hero-left {
  flex: 1;
  min-width: 0;
}
.hero-eyebrow {
  font-size: 13px;
  color: var(--accent);
  letter-spacing: 0.08em;
  font-weight: 600;
  margin-bottom: 20px;
}
.hero-headline {
  font-family: 'Bricolage Grotesque', 'Plus Jakarta Sans', sans-serif;
  font-weight: 800;
  font-size: 56px;
  color: #fff;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 20px;
}
.hero-headline em {
  font-style: normal;
  color: var(--accent);
}
.hero-subheadline {
  font-size: 17px;
  color: var(--text-secondary);
  line-height: 1.7;
  max-width: 420px;
}
.hero-right {
  flex-shrink: 0;
}
.hero-actions {
  display: flex;
  align-items: center;
  gap: 24px;
  margin-top: 36px;
}
.install-cmd {
  display: flex;
  align-items: center;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--text);
  gap: 12px;
  max-width: 440px;
  user-select: all;
  transition: border-color 0.2s;
}
.install-cmd:hover {
  border-color: var(--border-hover);
}
.install-dollar {
  color: var(--accent);
  user-select: none;
  font-weight: 700;
}
.install-text {
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.install-copy {
  margin-left: auto;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  transition: background 0.2s;
}
.install-copy:hover {
  background: var(--accent-hover);
}
.hero-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 16px;
}
.hero-compat {
  font-size: 12px;
  color: var(--text-muted);
}

/* ═══════════════════════════════════════
   2. UNIFIED FILTER BAR
   ═══════════════════════════════════════ */
.filter-bar-wrapper {
  height: 52px;
  z-index: 100;
  transition: all 0.3s ease;
}
.filter-bar-wrapper.sticky {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
}
.filter-bar-sentinel {
  height: 0;
}
.filter-bar {
  height: 52px;
  background: rgba(16,15,13,0.92);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 64px;
  max-width: 100%;
  overflow: hidden;
}
.filter-categories {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  flex: 1;
  min-width: 0;
}
.filter-categories::-webkit-scrollbar { display: none; }
.filter-pill {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid transparent;
  padding: 6px 14px;
  flex-shrink: 0;
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  transition: all 0.25s ease;
  user-select: none;
  white-space: nowrap;
  flex-shrink: 0;
}
.filter-pill:hover { color: var(--text-secondary); }
.filter-pill.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* View toggle — standalone row above filter bar */
.view-toggle-row {
  display: flex;
  justify-content: center;
  padding: 36px 64px 0;
  max-width: 1280px;
  margin: 0 auto;
}
.view-toggle {
  display: flex;
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 4px;
  gap: 2px;
}
.view-tab {
  background: transparent;
  color: var(--text-muted);
  border: none;
  padding: 10px 28px;
  border-radius: 8px;
  font-size: 15px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  transition: all 0.25s ease;
  white-space: nowrap;
  font-weight: 600;
  letter-spacing: 0.01em;
}
.view-tab:hover { color: var(--text-secondary); }
.view-tab.active {
  background: var(--accent);
  color: #fff;
}
.style-chip {
  background: transparent;
  color: var(--text-muted);
  border: 1px solid rgba(255,245,230,0.1);
  padding: 5px 14px;
  border-radius: 6px;
  font-size: 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  transition: all 0.25s;
  flex-shrink: 0;
}
.style-chip:hover { color: var(--text-secondary); border-color: rgba(255,245,230,0.2); }
.style-chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.style-search-wrap {
  position: relative;
  flex-shrink: 0;
  margin-left: 8px;
}
.style-search {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,245,230,0.12);
  color: var(--text-secondary);
  font-size: 12px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  padding: 5px 28px 5px 10px;
  border-radius: 6px;
  outline: none;
  width: 120px;
  transition: border-color 0.25s, width 0.25s;
}
.style-search::placeholder { color: var(--text-muted); opacity: 0.6; }
.style-search:focus { border-color: rgba(255,245,230,0.3); width: 160px; }
.style-search-clear {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 14px;
  cursor: pointer;
  padding: 0 2px;
  line-height: 1;
  display: none;
  opacity: 0.6;
  transition: opacity 0.2s;
}
.style-search-clear:hover { opacity: 1; }
.style-search-wrap.has-text .style-search-clear { display: block; }
.styles-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.style-card {
  border-radius: 10px;
  overflow: hidden;
  background: var(--bg-card);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), box-shadow 0.35s ease, border-color 0.35s ease;
}
.style-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 48px rgba(0,0,0,0.5);
  border-color: var(--border-hover);
}
.style-card-preview {
  width: 100%;
  aspect-ratio: 16/10;
  overflow: hidden;
  font-size: 14px;
}
.style-card-info {
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.style-card-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-weight: 600;
  font-size: 14px;
  color: var(--text);
}
.style-card-cat {
  font-size: 11px;
  color: var(--text-muted);
}
@media (max-width: 900px) {
  .styles-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .styles-grid { grid-template-columns: 1fr; }
}

/* ═══════════════════════════════════════
   2b. RECOMMENDATION SECTION
   ═══════════════════════════════════════ */
.rec-section { display: none; margin-bottom: 3rem; background: linear-gradient(135deg, rgba(232,100,58,0.06) 0%, rgba(232,100,58,0.02) 100%); border: 1px solid rgba(232,100,58,0.12); border-radius: 20px; padding: 2rem 2.2rem 2.2rem; }
.rec-section.visible { display: block; }
.rec-header { margin-bottom: 1.8rem; }
.rec-label { display: inline-block; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); background: rgba(232,100,58,0.1); padding: 0.3em 0.8em; border-radius: 6px; margin-bottom: 0.6rem; }
.rec-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 2rem; font-weight: 800; color: var(--text); margin-bottom: 0.4rem; }
.rec-meta { font-size: 0.82rem; color: var(--text-muted); }
.rec-meta span { display: inline-block; background: var(--bg-card); border: 1px solid var(--border); padding: 0.2rem 0.6rem; border-radius: 99px; margin-left: 0.4rem; font-size: 0.72rem; }
.rec-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
.rec-card { background: var(--bg-card); border: 1px solid rgba(232,100,58,0.15); border-radius: 14px; overflow: hidden; cursor: pointer; transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s; }
.rec-card:hover { transform: translateY(-6px) scale(1.01); border-color: var(--accent); box-shadow: 0 16px 48px rgba(232,100,58,0.15); }
.rec-card .style-card-preview { width: 100%; aspect-ratio: 16/10; overflow: hidden; font-size: 14px; }
.rec-info { padding: 1.1rem 1.2rem; }
.rec-name { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.1rem; font-weight: 700; color: var(--text); margin-bottom: 0.3rem; }
.rec-reason { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }
.rec-divider { border: none; margin-bottom: 2rem; }
@media (max-width: 900px) { .rec-grid { grid-template-columns: 1fr 1fr; } .rec-section { padding: 1.5rem 1.5rem 1.8rem; } }
@media (max-width: 600px) { .rec-grid { grid-template-columns: 1fr; } .rec-section { padding: 1.2rem 1rem 1.5rem; } .rec-title { font-size: 1.5rem; } }

/* ═══════════════════════════════════════
   3. TEMPLATE GRID
   ═══════════════════════════════════════ */
.grid-section {
  max-width: 1280px;
  margin: 0 auto;
  padding: 48px 64px 80px;
}

/* Featured row */
.featured-label {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 12px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
  margin-bottom: 20px;
}
.featured-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
  margin-bottom: 48px;
}
.featured-row .tpl-card {
  border: 1px solid transparent;
  background-image: linear-gradient(var(--bg-card), var(--bg-card)), linear-gradient(135deg, rgba(232,100,58,0.3), rgba(232,100,58,0.08));
  background-origin: border-box;
  background-clip: padding-box, border-box;
}

/* Main grid */
.tpl-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

/* Card */
.tpl-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.35s cubic-bezier(0.16,1,0.3,1), box-shadow 0.35s ease, border-color 0.35s ease;
  position: relative;
}
.tpl-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 48px rgba(0,0,0,0.5);
  border-color: var(--border-hover);
}
/* Hover overlay */
.tpl-card-preview {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 10;
  overflow: hidden;
  background: var(--bg);
}
.tpl-card-preview iframe {
  width: 1280px;
  height: 800px;
  border: none;
  pointer-events: none;
  transform-origin: 0 0;
  position: absolute;
  top: 0;
  left: 0;
}
.tpl-card-preview::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, transparent 60%, rgba(28,27,24,0.5) 100%);
  pointer-events: none;
}
.tpl-card-hover-overlay {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 3;
  pointer-events: none;
}
.tpl-card:hover .tpl-card-hover-overlay {
  opacity: 1;
}
.tpl-hover-copy {
  position: absolute;
  bottom: 6px;
  right: 6px;
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(255,255,255,0.15);
  color: rgba(255,255,255,0.7);
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  pointer-events: auto;
  transition: background 0.2s;
}
.tpl-hover-copy:hover {
  background: rgba(0,0,0,0.7);
  color: #fff;
}
.tpl-card-body {
  padding: 14px 16px 12px;
}
.tpl-card-name {
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}
.tpl-card-meta {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.tpl-card-dots {
  display: flex;
  gap: 5px;
}
.tpl-card-dots span {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  display: inline-block;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.2s;
}
.tpl-card-dots span:hover { transform: scale(1.3); }

/* Enhanced badge */
.tpl-card-enhanced {
  position: absolute;
  top: 10px;
  right: 10px;
  font-size: 10px;
  color: #fff;
  background: var(--accent);
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  z-index: 2;
}

/* Show-all link */
.show-all-row {
  text-align: center;
  padding: 40px 0 0;
}
.show-all-link {
  color: var(--accent);
  font-size: 15px;
  font-weight: 600;
  text-decoration: none;
  cursor: pointer;
  transition: color 0.2s;
  font-family: 'Plus Jakarta Sans', sans-serif;
  background: none;
  border: none;
}
.show-all-link:hover { color: var(--accent-hover); }

/* ═══════════════════════════════════════
   3B. DIAGRAM CARDS
   ═══════════════════════════════════════ */
.diagrams-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
  max-width: 1280px;
  margin: 0 auto;
  padding: 32px 64px;
}
.diagram-card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.diagram-card:hover {
  border-color: var(--accent);
  box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.diagram-card-preview {
  position: relative;
  width: 100%;
  aspect-ratio: 16 / 10;
  overflow: hidden;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
}
.diagram-card-preview iframe {
  width: 1280px;
  height: 800px;
  border: none;
  pointer-events: none;
  transform-origin: 0 0;
  position: absolute;
  top: 0;
  left: 0;
}
.diagram-card-preview::after {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, rgba(56,189,248,0.04) 0%, transparent 70%);
}
.diagram-type-tag {
  position: absolute;
  top: 12px;
  left: 12px;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  z-index: 1;
}
.diagram-type-tag.arch { background: rgba(56,189,248,0.15); color: #38bdf8; }
.diagram-type-tag.flow { background: rgba(168,85,247,0.15); color: #a855f7; }
.diagram-card-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  background: rgba(15,23,42,0.5);
  transition: opacity 0.2s;
  z-index: 2;
}
.diagram-card:hover .diagram-card-overlay { opacity: 1; }
.diagram-hover-btn {
  padding: 8px 20px;
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px;
  background: rgba(255,255,255,0.1);
  color: #fff;
  font-family: 'Plus Jakarta Sans', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background 0.2s, border-color 0.2s;
}
.diagram-hover-btn:hover { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.5); }
.diagram-card-body { padding: 14px 16px; }
.diagram-card-name { font-size: 15px; font-weight: 700; color: var(--text-primary); margin-bottom: 4px; }
.diagram-card-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.4; }

@media (max-width: 900px) { .diagrams-grid { grid-template-columns: repeat(2, 1fr); padding: 24px 32px; } }
@media (max-width: 600px) { .diagrams-grid { grid-template-columns: 1fr; padding: 16px 20px; } }

/* ═══════════════════════════════════════
   4. FOOTER
   ═══════════════════════════════════════ */
.site-footer {
  max-width: 1280px;
  margin: 0 auto;
  padding: 40px 64px 32px;
  text-align: center;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-muted);
}
.site-footer a {
  color: var(--text-secondary);
  text-decoration: none;
  transition: color 0.2s;
}
.site-footer a:hover { color: var(--accent); }

/* ═══════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════ */
@media (max-width: 1024px) {
  .hero { padding: 48px 32px 32px; }
  .hero-headline { font-size: 42px; }
  .view-toggle-row { padding: 24px 32px 0; }
  .filter-bar { padding: 0 32px; }
  .grid-section { padding: 40px 32px 60px; }
  .site-footer { padding: 32px 32px 24px; }
}
@media (max-width: 768px) {
  .hero {
    padding: 40px 20px 32px;
    min-height: auto;
  }
  .hero-top {
    flex-direction: column;
    gap: 32px;

/* Noise/grain texture overlay */
.noise-overlay::after, .style-watercolor::after, .style-dark-botanical::after, .style-ink-wash::after {
  content: ''; position: absolute; inset: 0; z-index: 1; opacity: 0.04; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-repeat: repeat; background-size: 256px 256px;
}

/* ═══════════════════════════════════════
   PREMIUM INTERACTIONS
   ═══════════════════════════════════════ */

/* a) Scroll-triggered fade-in */
.appear {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
}
.appear.visible {
  opacity: 1;
  transform: translateY(0);
}

/* b) Hero text reveal animation */
.hero-reveal {
  opacity: 0;
  transform: translateY(32px);
  animation: heroReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
}
@keyframes heroReveal {
  to { opacity: 1; transform: translateY(0); }
}
.hero-reveal-1 { animation-delay: 0.1s; }
.hero-reveal-2 { animation-delay: 0.25s; }
.hero-reveal-3 { animation-delay: 0.4s; }
.hero-reveal-4 { animation-delay: 0.55s; }

/* c) Cursor glow on hero */
.hero {
  position: relative;
}
.hero-glow {
  position: absolute;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(232,100,58,0.06) 0%, transparent 70%);
  pointer-events: none;
  transform: translate(-50%, -50%);
  transition: left 0.3s ease, top 0.3s ease;
  z-index: 0;
}

/* d) Card hover inner glow */
.tpl-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 10px;
  opacity: 0;
  background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(232,100,58,0.04), transparent 40%);
  transition: opacity 0.3s;
  z-index: 0;
  pointer-events: none;
}
.tpl-card:hover::before {
  opacity: 1;
}

/* e) Grid fade transition on filter change */
.grid-fade-out {
  opacity: 0;
  transition: opacity 0.2s ease;
}
.grid-fade-in {
  opacity: 1;
  transition: opacity 0.3s ease;
}

/* f) Scroll progress bar */
.scroll-progress {
  position: fixed;
  top: 0;
  left: 0;
  height: 2px;
  background: var(--accent);
  z-index: 9999;
  transition: width 0.1s linear;
  width: 0%;
}

/* Preview Overlay */
.preview-overlay {
  position: fixed;
  inset: 0;
  z-index: 2000;
  background: rgba(0,0,0,0.88);
  backdrop-filter: blur(20px);
  display: flex;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}
.preview-overlay.active {
  opacity: 1;
  pointer-events: auto;
}
.preview-topbar {
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 24px;
  flex-shrink: 0;
  gap: 16px;
}
.preview-close {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  border: none;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  line-height: 1;
}
.preview-close:hover {
  background: rgba(255,255,255,0.2);
}
.preview-title {
  flex: 1;
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 500;
  text-align: center;
}
.preview-newtab {
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  text-decoration: none;
  padding: 6px 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  transition: background 0.2s, color 0.2s, border-color 0.2s;
  font-family: inherit;
  white-space: nowrap;
}
.preview-newtab:hover {
  background: rgba(255,255,255,0.12);
  border-color: rgba(255,255,255,0.25);
  color: #fff;
}
.preview-iframe-wrap {
  flex: 1;
  display: flex;
  align-items: stretch;
  justify-content: center;
  padding: 0 32px;
  min-height: 0;
}
.preview-iframe-wrap iframe {
  width: 100%;
  max-width: 1440px;
  height: 100%;
  border: none;
  border-radius: 8px 8px 0 0;
  box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  background: var(--bg);
}
.preview-strip-wrap {
  flex-shrink: 0;
  padding: 0 32px;
  overflow: hidden;
}
.preview-strip {
  display: flex;
  gap: 8px;
  padding: 12px 0;
  overflow-x: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.15) transparent;
  -webkit-overflow-scrolling: touch;
}
.preview-strip::-webkit-scrollbar { height: 8px; }
.preview-strip::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 4px; margin: 0 8px; }
.preview-strip::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 4px; }
.preview-strip::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
.preview-strip-item {
  flex-shrink: 0;
  width: 280px;
  aspect-ratio: 16/10;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  border: 2px solid transparent;
  font-size: 14px;
  opacity: 0.65;
  transition: opacity 0.2s, border-color 0.2s, transform 0.2s;
  position: relative;
}
.preview-strip-item:hover { opacity: 0.9; transform: translateY(-2px); }
.preview-strip-item.active { opacity: 1; border-color: var(--accent); transform: translateY(-2px); }
.preview-strip-item .strip-label {
  position: absolute;
  bottom: 6px;
  left: 6px;
  padding: 3px 8px;
  background: rgba(0,0,0,0.6);
  border-radius: 4px;
  font-size: 12px;
  color: #fff;
  white-space: nowrap;
  max-width: calc(100% - 8px);
  overflow: hidden;
  text-overflow: ellipsis;
}
.preview-bottombar {
  height: 42px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  flex-shrink: 0;
}
.preview-nav {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-secondary);
  padding: 7px 20px;
  border-radius: 6px;
  font-size: 13px;
  font-family: 'Plus Jakarta Sans', sans-serif;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.preview-nav:hover {
  background: rgba(255,255,255,0.15);
  color: #fff;
}

/* Sticky Install Bar */
.sticky-install {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 52px;
  background: rgba(16,15,13,0.95);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  z-index: 200;
  transform: translateY(100%);
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}
.sticky-install.visible {
  transform: translateY(0);
}
.sticky-label {
  color: var(--text-muted);
  font-size: 13px;
}
.sticky-cmd {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text);
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 14px;
}

@media (max-width: 768px) {
  .preview-iframe-wrap { padding: 0 8px 4px; }
  .preview-iframe-wrap iframe { border-radius: 4px; }
  .preview-close { width: 44px; height: 44px; font-size: 22px; }
  .preview-strip-item { width: 120px; height: 56px; }
  .preview-strip-wrap { padding: 0 8px; }
  .preview-strip { gap: 6px; padding: 8px 0; }
  .preview-topbar { padding: 0 12px; gap: 8px; }
  .preview-title { font-size: 13px; }
  .preview-newtab { font-size: 12px; padding: 8px 12px; min-height: 44px; }
}

function renderStylesGrid(filter) {
  var grid = document.getElementById('stylesGrid');
  var stylesView = document.getElementById('stylesView');
  stylesView.classList.add('grid-fade-out');
  stylesView.classList.remove('grid-fade-in');
  setTimeout(function() {
  grid.innerHTML = '';
  var filtered;
  if (filter === 'all') {
    filtered = STYLES;
  } else if (filter === 'curated') {

function getFilteredTemplates() {
  var list = TEMPLATES;
  // Category filter
  if (activeCategory === 'curated') {
    list = TEMPLATES.filter(function(t) { return CURATED_IDS.indexOf(t.id) !== -1; });
    // Maintain curated order
    list.sort(function(a, b) { return CURATED_IDS.indexOf(a.id) - CURATED_IDS.indexOf(b.id); });
  } else {
    list = TEMPLATES.filter(function(t) { return t.category === activeCategory; });
  }
  // Style filter
  if (activeStyle) {
    list = list.filter(function(t) {
      return t.variants.some(function(v) { return v.style === activeStyle; });
    });
  }
  return list;
}

function createCard(t, variantIdx) {
  variantIdx = variantIdx || 0;
  // If style filter active, find matching variant
  var vi = 0;
  if (activeStyle) {
    for (var i = 0; i < t.variants.length; i++) {
      if (t.variants[i].style === activeStyle) { vi = i; break; }
    }
  } else {
    vi = variantIdx;
  }
  var v = t.variants[vi];

  var card = document.createElement('div');
  card.className = 'tpl-card appear';
  card.style.opacity = '0';
  card.style.transform = 'translateY(20px)';

  var dotsHtml = '';
  t.variants.forEach(function(vr) {
    dotsHtml += '<span style="background:' + vr.color + '" title="' + vr.style + '"></span>';
  });

  var enhancedBadge = t.enhanced ? '<span class="tpl-card-enhanced">Enhanced</span>' : '';

  var styleName = v.style;
  card.innerHTML =
    '<div class="tpl-card-preview">' +
      enhancedBadge +
      '<div class="tpl-card-hover-overlay">' +
        '<button class="tpl-hover-copy" data-style="' + styleName + '">复制指令</button>' +
      '</div>' +
    '</div>' +
    '<div class="tpl-card-body">' +
      '<div class="tpl-card-name">' + (t.brand || t.nameCn) + '</div>' +
      '<div class="tpl-card-meta">' + (CAT_NAMES[t.category] || t.nameCn) + ' · ' + v.style + ' · ' + t.slides + ' slides</div>' +
      '<div class="tpl-card-dots">' + dotsHtml + '</div>' +
    '</div>';

  card.setAttribute('data-url', 'scenarios/' + v.file);
  card.setAttribute('data-title', (t.brand || t.nameCn) + ' · ' + v.style);
  card.addEventListener('click', function(e) {
    if (e.target.closest('.tpl-card-dots span')) return;
    if (e.target.closest('.tpl-hover-copy')) return;
    var list = buildTemplatePreviewList();
    var url = card.getAttribute('data-url');
    var title = card.getAttribute('data-title');
    var idx = 0;
    for (var i = 0; i < list.length; i++) { if (list[i].url === url) { idx = i; break; } }
    openPreview(url, title, list, idx);
  });

  // Dot click to swap style
  card.querySelectorAll('.tpl-card-dots span').forEach(function(dot, idx) {
    dot.addEventListener('click', function(e) {
      e.stopPropagation();
      var newV = t.variants[idx];
      if (!newV) return;
      card.querySelector('.tpl-card-meta').textContent = (CAT_NAMES[t.category] || t.nameCn) + ' · ' + newV.style + ' · ' + t.slides + ' slides';
      card.setAttribute('data-url', 'scenarios/' + newV.file);
      card.setAttribute('data-title', (t.brand || t.nameCn) + ' · ' + newV.style);
      var copyBtn = card.querySelector('.tpl-hover-copy');
      if (copyBtn) copyBtn.setAttribute('data-style', newV.style);
      // Reload iframe if present
      var iframe = card.querySelector('.tpl-card-preview iframe');
      if (iframe) iframe.src = 'scenarios/' + newV.file;
    });
  });

  return card;
}

function lazyLoadCard(card, file) {
  var ioCard = new IntersectionObserver(function(entries, obs) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        var preview = entry.target.querySelector('.tpl-card-preview');
        if (preview && !preview.querySelector('iframe')) {
          var iframe = document.createElement('iframe');
          iframe.src = 'scenarios/' + file;
          iframe.loading = 'lazy';
          iframe.tabIndex = -1;
          iframe.setAttribute('aria-hidden', 'true');
          iframe.style.cssText = 'width:1280px;height:800px;border:none;pointer-events:none;transform-origin:0 0;position:absolute;top:0;left:0;';
          preview.appendChild(iframe);
          var scale = preview.offsetWidth / 1280;
          iframe.style.transform = 'scale(' + scale + ')';
        }
        obs.unobserve(entry.target);
      }
    });
  }, { rootMargin: '300px' });
  ioCard.observe(card);
}

function renderGrid() {
  var featuredSection = document.getElementById('featuredSection');
  var featuredRow = document.getElementById('featuredRow');
  var tplGrid = document.getElementById('tplGrid');
  var showAllRow = document.getElementById('showAllRow');
  var gridSection = document.getElementById('grid');
  var templates = getFilteredTemplates();

  // Fade out before swapping content
  gridSection.classList.add('grid-fade-out');
  gridSection.classList.remove('grid-fade-in');

  setTimeout(function() {
  featuredRow.innerHTML = '';
  tplGrid.innerHTML = '';

  var isCurated = activeCategory === 'curated';

  if (isCurated && !showAll) {
    // Featured: first 3
    featuredSection.style.display = 'block';
    var featured = templates.slice(0, 3);
    var rest = templates.slice(3);

    featured.forEach(function(t, idx) {
      var card = createCard(t);
      featuredRow.appendChild(card);
      var vi = activeStyle ? t.variants.findIndex(function(v) { return v.style === activeStyle; }) : 0;
      lazyLoadCard(card, t.variants[Math.max(vi, 0)].file);
      setTimeout(function() {
        card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }, 60 + idx * 80);
    });

    rest.forEach(function(t, idx) {
      var card = createCard(t);
      tplGrid.appendChild(card);
      var vi = activeStyle ? t.variants.findIndex(function(v) { return v.style === activeStyle; }) : 0;
      lazyLoadCard(card, t.variants[Math.max(vi, 0)].file);
      setTimeout(function() {
        card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }, 300 + idx * 80);
    });

    showAllRow.style.display = 'block';
  } else {
    // Non-curated or show all
    featuredSection.style.display = 'none';
    showAllRow.style.display = 'none';

    if (isCurated && showAll) {
      // Show ALL templates
      templates = TEMPLATES;
      if (activeStyle) {
        templates = templates.filter(function(t) {
          return t.variants.some(function(v) { return v.style === activeStyle; });
        });
      }
    }

    templates.forEach(function(t, idx) {
      var card = createCard(t);
      tplGrid.appendChild(card);
      var vi = activeStyle ? t.variants.findIndex(function(v) { return v.style === activeStyle; }) : 0;
      lazyLoadCard(card, t.variants[Math.max(vi, 0)].file);
      setTimeout(function() {
        card.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
        card.style.opacity = '1';
        card.style.transform = 'translateY(0)';
      }, 60 + idx * 60);
    });
  }

  // Resize iframes on window resize
  window.addEventListener('resize', resizeAllIframes);

  // Fade in after content swap
  gridSection.classList.remove('grid-fade-out');
  gridSection.classList.add('grid-fade-in');

  // Re-observe new cards for appear animation
  if (window._appearObserver) {
    gridSection.querySelectorAll('.appear').forEach(function(el) {
      window._appearObserver.observe(el);
    });
  }
  }, 200); // end of fade-out setTimeout
}

function resizeAllIframes() {
  document.querySelectorAll('.tpl-card-preview').forEach(function(preview) {
    var iframe = preview.querySelector('iframe');
    if (iframe) {
      var scale = preview.offsetWidth / 1280;
      iframe.style.transform = 'scale(' + scale + ')';
    }
  });
}

  showAll = true;
  renderGrid();
  // Scroll to grid
  document.getElementById('grid').scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// PREVIEW OVERLAY
// ══════════════════════════════════════
var previewOverlay = document.getElementById('previewOverlay');
var previewIframe = document.getElementById('previewIframe');
var previewTitle = document.getElementById('previewTitle');
var previewNewTab = document.getElementById('previewNewTab');
var stickyInstall = document.getElementById('stickyInstall');
var previewList = [];
var previewIndex = 0;

var previewStrip = document.getElementById('previewStrip');

function renderPreviewStrip() {
  previewStrip.innerHTML = '';
  previewList.forEach(function(item, i) {
    var thumb = document.createElement('div');
    thumb.className = 'preview-strip-item' + (i === previewIndex ? ' active' : '');
    // Find matching style preview
    var styleId = null;
    for (var j = 0; j < STYLES.length; j++) {
      if (STYLES[j].demo === item.url) { styleId = STYLES[j].id; break; }
    }
    var previewFn = styleId && STYLE_PREVIEWS[styleId];
    var inner = previewFn ? previewFn() : '<div style="background:#222;height:100%;"></div>';
    thumb.innerHTML = inner + '<div class="strip-label">' + item.title + '</div>';
    (function(idx) {
      thumb.addEventListener('click', function() {
        previewIndex = idx;
        var it = previewList[idx];
        previewIframe.src = it.url;
        previewTitle.textContent = it.title;
        previewNewTab.href = it.url;
        updateStripActive();
      });
    })(i);
    previewStrip.appendChild(thumb);
  });
}

function updateStripActive() {
  var items = previewStrip.querySelectorAll('.preview-strip-item');
  items.forEach(function(el, i) {
    el.classList.toggle('active', i === previewIndex);
  });
  // Scroll active into view
  if (items[previewIndex]) {
    items[previewIndex].scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  }
}

function openPreview(url, title, list, index) {
  previewList = list || [];
  previewIndex = index || 0;
  previewIframe.src = url;
  previewTitle.textContent = title || '';
  previewNewTab.href = url;
  previewOverlay.classList.add('active');
  document.body.style.overflow = 'hidden';
  stickyInstall.classList.remove('visible');
  renderPreviewStrip();
}

function closePreview() {
  previewOverlay.classList.remove('active');
  document.body.style.overflow = '';
  setTimeout(function() { previewIframe.src = ''; }, 300);
  // Re-check sticky visibility based on hero
  var heroRect = document.getElementById('hero').getBoundingClientRect();
  if (heroRect.bottom < 0) {
    stickyInstall.classList.add('visible');
  }
}

function previewNav(dir) {
  if (!previewList.length) return;
  previewIndex = Math.max(0, Math.min(previewList.length - 1, previewIndex + dir));
  var item = previewList[previewIndex];
  previewIframe.src = item.url;
  previewTitle.textContent = item.title;
  previewNewTab.href = item.url;
  updateStripActive();
}

document.getElementById('previewClose').addEventListener('click', closePreview);
document.getElementById('previewPrev').addEventListener('click', function() { previewNav(-1); });
document.getElementById('previewNext').addEventListener('click', function() { previewNav(1); });
document.getElementById('previewCopy').addEventListener('click', function() {
  var title = previewTitle.textContent || '';
  navigator.clipboard.writeText('用 ' + title + ' 风格做一个关于[你的主题]的演示文稿');
  this.textContent = '已复制';
  var btn = this;
  setTimeout(function() { btn.textContent = '复制指令'; }, 1500);
});
previewOverlay.addEventListener('click', function(e) {
  if (e.target === previewOverlay) closePreview();
});
document.addEventListener('keydown', function(e) {
  if (!previewOverlay.classList.contains('active')) return;
  if (e.key === 'Escape') { closePreview(); e.preventDefault(); }
  if (e.key === 'ArrowLeft') { previewNav(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { previewNav(1); e.preventDefault(); }
});

// Build preview list from currently visible template cards
function buildTemplatePreviewList() {
  var cards = document.querySelectorAll('#scenarioView .tpl-card');
  var list = [];
  cards.forEach(function(c) {
    var url = c.getAttribute('data-url');
    var title = c.getAttribute('data-title');
    if (url) list.push({ url: url, title: title });
  });
  return list;
}

// ══════════════════════════════════════
// CARD COPY PROMPT DELEGATION
// ══════════════════════════════════════
document.addEventListener('click', function(e) {
  var copyBtn = e.target.closest('.tpl-hover-copy');
  if (copyBtn) {
    e.stopPropagation();
    var style = copyBtn.getAttribute('data-style');
    navigator.clipboard.writeText('用 ' + style + ' 风格做一个关于[你的主题]的演示文稿');
    copyBtn.textContent = 'OK';
    setTimeout(function() { copyBtn.textContent = '复制指令'; }, 1500);
    return;
  }
});

// ══════════════════════════════════════
// STICKY INSTALL BAR
// ══════════════════════════════════════
var heroEl = document.getElementById('hero');
var stickyObserver = new IntersectionObserver(function(entries) {
  entries.forEach(function(entry) {
    if (!previewOverlay.classList.contains('active')) {
      stickyInstall.classList.toggle('visible', !entry.isIntersecting);
    }
  });
}, { threshold: 0 });
stickyObserver.observe(heroEl);


// ══════════════════════════════════════
// PREMIUM INTERACTIONS
// ══════════════════════════════════════

// a) IntersectionObserver for .appear elements
(function() {
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
  window._appearObserver = observer;
  document.querySelectorAll('.appear').forEach(function(el) {
    observer.observe(el);
  });
})();

// c) Mouse tracking for hero glow
(function() {
  var hero = document.getElementById('hero');
  var glow = document.getElementById('heroGlow');
  if (!hero || !glow) return;
  hero.addEventListener('mousemove', function(e) {
    var rect = hero.getBoundingClientRect();
    glow.style.left = (e.clientX - rect.left) + 'px';
    glow.style.top = (e.clientY - rect.top) + 'px';
  });
  hero.addEventListener('mouseleave', function() {
    glow.style.left = '-300px';
    glow.style.top = '-300px';
  });
})();

// d) Mouse tracking for card inner glow (CSS custom properties)
(function() {
  document.addEventListener('mousemove', function(e) {
    var card = e.target.closest('.tpl-card');
    if (!card) return;
    var rect = card.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    card.style.setProperty('--mouse-x', x + 'px');
    card.style.setProperty('--mouse-y', y + 'px');
  });
})();

// f) Scroll progress bar
(function() {
  var bar = document.getElementById('scrollProgress');
  if (!bar) return;
  window.addEventListener('scroll', function() {
    var scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
    var docHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
    var progress = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
    bar.style.width = progress + '%';
  }, { passive: true });
})();

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
(function init() {
  renderGrid();
})();
</script>
